<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3870 LF477 Template Pre-Check</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

  header { background: #1a1a2e; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 13px; opacity: 0.6; }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  /* Drop Zone */
  #drop-zone {
    border: 2px dashed #b0b8c9;
    border-radius: 12px;
    background: white;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 28px;
  }
  #drop-zone:hover, #drop-zone.drag-over { border-color: #4a6cf7; background: #f0f3ff; }
  #drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
  #drop-zone h2 { font-size: 16px; font-weight: 600; color: #2d3a4a; margin-bottom: 6px; }
  #drop-zone p { font-size: 13px; color: #7a8a9a; }
  #drop-zone .file-name { margin-top: 10px; font-size: 13px; color: #4a6cf7; font-weight: 500; }
  #file-input { display: none; }

  /* Summary bar */
  #summary { display: none; background: white; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; }
  .stat-card { text-align: center; padding: 14px; border-radius: 8px; background: #f5f7fa; }
  .stat-card.error { background: #fff0f0; }
  .stat-card.ok { background: #f0fff4; }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card.error .num { color: #d93025; }
  .stat-card.ok .num { color: #1a7f45; }
  .stat-card .lbl { font-size: 11px; color: #6a7a8a; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Results */
  #results { display: none; }
  .section { background: white; border-radius: 12px; margin-bottom: 18px; overflow: hidden; }
  .section-header {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #eee;
    user-select: none;
  }
  .section-header.rule-ok { background: #f0fff4; color: #1a7f45; }
  .section-header.rule-warn { background: #fff8e1; color: #b45309; }
  .section-header.rule-err { background: #fff0f0; color: #b91c1c; }
  .section-header .badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    background: rgba(0,0,0,0.08);
  }
  .section-header .toggle { font-size: 12px; opacity: 0.5; }
  .section-body { display: none; }
  .section-body.open { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f5f7fa; padding: 10px 14px; text-align: left; font-weight: 600; color: #4a5568; font-size: 12px; border-bottom: 1px solid #e2e8f0; }
  td { padding: 9px 14px; border-bottom: 1px solid #f0f2f5; vertical-align: top; line-height: 1.4; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pill-red { background: #fde8e8; color: #b91c1c; }
  .pill-yellow { background: #fef3c7; color: #92400e; }
  .pill-blue { background: #dbeafe; color: #1e40af; }

  .ok-banner { padding: 16px 20px; color: #1a7f45; font-size: 13px; font-weight: 500; }

  .rule-label { font-size: 11px; color: #888; }
  .drug-col { font-weight: 500; }
  .msg-col { color: #d93025; }

  #no-issues { display: none; background: white; border-radius: 12px; padding: 40px; text-align: center; }
  #no-issues .big { font-size: 48px; margin-bottom: 12px; }
  #no-issues h2 { color: #1a7f45; font-size: 18px; margin-bottom: 8px; }
  #no-issues p { color: #6a7a8a; font-size: 14px; }

  .sheet-tag { display: inline-block; padding: 1px 7px; border-radius: 4px; background: #e8eaf6; color: #3949ab; font-size: 11px; font-weight: 600; margin-right: 4px; }

  /* Rule 1 duplicate groups */
  .dup-groups-wrap { padding: 12px 16px; display: flex; flex-direction: column; gap: 14px; }
  .dup-group { border: 2px solid #f59e0b; border-radius: 8px; overflow: hidden; }
  .dup-group-header {
    background: #fef3c7; padding: 8px 14px;
    font-size: 12px; font-weight: 700; color: #92400e;
    display: flex; align-items: center; gap: 8px;
  }
  .dup-group-header .dup-icon { font-size: 14px; }
  .dup-group table { border-top: 1px solid #fde68a; }
  .dup-group tr td { background: #fffbeb; }
  .dup-group tr:hover td { background: #fef9e7; }
  .dup-row-num { font-weight: 700; color: #b45309; font-size: 12px; }

  /* Rule 10 ordering groups */
  .ord-groups-wrap { padding: 12px 16px; display: flex; flex-direction: column; gap: 14px; }
  .ord-group { border: 2px solid #7c3aed; border-radius: 8px; overflow: hidden; }
  .ord-group-header {
    background: #ede9fe; padding: 8px 14px;
    font-size: 12px; font-weight: 700; color: #5b21b6;
    display: flex; align-items: center; gap: 8px;
  }
  .ord-comparison { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #ddd6fe; }
  .ord-col { padding: 10px 14px; }
  .ord-col + .ord-col { border-left: 1px solid #ddd6fe; }
  .ord-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .ord-col-title.pump { color: #b91c1c; }
  .ord-col-title.natural { color: #1a7f45; }
  .ord-entry { padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 4px; font-family: monospace; }
  .ord-entry.moved { background: #fde8e8; color: #b91c1c; font-weight: 600; }
  .ord-entry.correct { background: #f0fff4; color: #1a7f45; }
  .ord-entry.same { background: #f5f7fa; color: #4a5568; }
  .ord-fix { padding: 8px 14px; background: #f5f3ff; border-top: 1px solid #ddd6fe; font-size: 12px; color: #5b21b6; }
  .ord-symbol { padding: 8px 14px; background: #fdf4ff; border-top: 1px solid #e9d5ff; font-size: 12px; color: #7e22ce; }
  .row-chip { display: inline-block; padding: 1px 5px; background: #ede9fe; color: #5b21b6; border-radius: 3px; font-size: 10px; font-weight: 600; margin-left: 4px; }
  .space-indicator { display: inline-block; background: #fef08a; border: 1.5px dashed #ca8a04; border-radius: 3px; width: 1ch; height: 1.1em; vertical-align: middle; margin-right: 1px; cursor: help; }

  /* Rule 9 character overflow highlighting */
  .name-display { font-family: monospace; font-size: 12px; line-height: 1.6; word-break: break-all; }
  .name-fits { color: #1a1a2e; }
  .name-over { background: #fde8e8; color: #b91c1c; font-weight: 700; border-bottom: 2px solid #b91c1c; border-radius: 2px; padding: 0 1px; }
  .name-field-label { font-size: 11px; color: #6a7a8a; margin-bottom: 3px; }
  .name-pct { font-size: 11px; color: #b91c1c; margin-top: 3px; font-weight: 600; }
  .spell-word { font-family: monospace; font-size: 13px; letter-spacing: 0.4px; margin-bottom: 3px; }
  .spell-wrong { background: #fef08a; border-radius: 2px; padding: 0 1px; font-weight: 700; }
  .spell-suggest { font-size: 12px; color: #6b7280; }
  .unit-chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
  .unit-chip { display: inline-block; font-family: monospace; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.3px; }
  .unit-chip.is-ml { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
  .unit-chip.non-ml { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .unit-chip-label { font-size: 11px; color: #6b7280; }
  .unit-compat-note { font-size: 12px; color: #6b7280; }

  .run-btn {
    display: none; margin: 0 auto 24px; padding: 11px 28px; background: #4a6cf7;
    color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .run-btn:hover { background: #3b5de7; }
</style>

<body>

<header>
  <div>🩺</div>
  <h1>3870 LF477 Template Pre-Check</h1>
  <span>Pre-Check Templates from Pharmacist</span>
</header>

<div class="container">

  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📂</div>
    <h2>Drop LF477 Excel template here</h2>
    <p>Or click to browse — accepts .xlsx files</p>
    <div class="file-name" id="file-name-label"></div>
    <input type="file" id="file-input" accept=".xlsx,.xls">
  </div>

  <button class="run-btn" id="run-btn" onclick="runValidation()">▶ Run Pre-Check</button>

  <div id="summary">
    <div class="summary-grid" id="summary-grid"></div>
  </div>

  <div id="no-issues">
    <div class="big">✅</div>
    <h2>No issues found!</h2>
    <p>All entries passed validation. Template looks ready to program.</p>
  </div>

  <div id="results"></div>

</div>

<script>
// ─── Column indices (0-based) ───────────────────────────────────────────────
const C = {
  ROW_NUM:      0,   // A
  CARE_AREA:    1,   // B
  DRUG_NAME:    2,   // C
  DOSING_NAME:  3,   // D
  CONC_UNIT:    4,   // E
  CONC_AMT:     5,   // F
  DIL_UNIT:     6,   // G
  DIL_AMT:      7,   // H
  PRI_UNIT:     8,   // I  Primary Dose Unit
  PRI_INIT:     9,   // J  Primary Initial Dose
  PRI_UH:      10,   // K  Primary Upper Hard
  PRI_LH:      11,   // L  Primary Lower Hard
  PRI_US:      12,   // M  Primary Upper Soft
  PRI_LS:      13,   // N  Primary Lower Soft
  PRI_T_INIT:  14,   // O  Primary Initial Time
  PRI_T_UH:    15,   // P  Primary Time Upper Hard
  PRI_T_LH:    16,   // Q  Primary Time Lower Hard
  PRI_T_US:    17,   // R  Primary Time Upper Soft
  PRI_T_LS:    18,   // S  Primary Time Lower Soft
  BOL_UNIT:    19,   // T  Bolus Dose Unit
  BOL_INIT:    20,   // U  Bolus Initial Dose
  BOL_UH:      21,   // V  Bolus Upper Hard
  BOL_LH:      22,   // W  Bolus Lower Hard
  BOL_US:      23,   // X  Bolus Upper Soft
  BOL_LS:      24,   // Y  Bolus Lower Soft
  BOL_T_INIT:  25,   // Z  Bolus Initial Time
  BOL_T_UH:    26,   // AA Bolus Time Upper Hard
  BOL_T_LH:    27,   // AB Bolus Time Lower Hard
  BOL_T_US:    28,   // AC Bolus Time Upper Soft
  BOL_T_LS:    29,   // AD Bolus Time Lower Soft
  LOD_UNIT:    30,   // AE Loading Dose Unit
  LOD_INIT:    31,   // AF Loading Initial Dose
  LOD_UH:      32,   // AG Loading Upper Hard
  LOD_LH:      33,   // AH Loading Lower Hard
  LOD_US:      34,   // AI Loading Upper Soft
  LOD_LS:      35,   // AJ Loading Lower Soft
  LOD_T_INIT:  36,   // AK Loading Initial Time
  LOD_T_UH:    37,   // AL Loading Time Upper Hard
  LOD_T_LH:    38,   // AM Loading Time Lower Hard
  LOD_T_US:    39,   // AN Loading Time Upper Soft
  LOD_T_LS:    40,   // AO Loading Time Lower Soft
  WT_UH:       41,   // AP Weight Upper Hard
  WT_LH:       42,   // AQ Weight Lower Hard
  WT_US:       43,   // AR Weight Upper Soft
  WT_LS:       44,   // AS Weight Lower Soft
  KVO_MODE:    45,   // AT KVO Mode
  KVO_RATE:    46,   // AU KVO Rate
  QUICK_RCL:   47,   // AV Quick Recall (may not exist)
};

// ─── Time limit columns (O,P,Q,R,S = Primary; Z,AA-AD = Bolus; AK,AL-AO = Loading) ──
const TIME_COLS = [
  { idx: 14, label: 'O (Primary Initial Time)' },
  { idx: 15, label: 'P (Primary Time Upper Hard)' },
  { idx: 16, label: 'Q (Primary Time Lower Hard)' },
  { idx: 17, label: 'R (Primary Time Upper Soft)' },
  { idx: 18, label: 'S (Primary Time Lower Soft)' },
  { idx: 25, label: 'Z (Bolus Initial Time)' },
  { idx: 26, label: 'AA (Bolus Time Upper Hard)' },
  { idx: 27, label: 'AB (Bolus Time Lower Hard)' },
  { idx: 28, label: 'AC (Bolus Time Upper Soft)' },
  { idx: 29, label: 'AD (Bolus Time Lower Soft)' },
  { idx: 36, label: 'AK (Loading Initial Time)' },
  { idx: 37, label: 'AL (Loading Time Upper Hard)' },
  { idx: 38, label: 'AM (Loading Time Lower Hard)' },
  { idx: 39, label: 'AN (Loading Time Upper Soft)' },
  { idx: 40, label: 'AO (Loading Time Lower Soft)' },
];

// ─── Character capacity (how many of each char fit in the display field) ────
const LC = {a:24,b:20,c:25,d:20,e:22,f:31,g:20,h:20,i:31,j:31,k:22,l:31,m:13,n:20,o:20,p:20,q:20,r:29,s:25,t:31,u:21,v:25,w:16,x:24,y:25,z:27};
const UC = {A:20,B:19,C:20,D:17,E:22,F:24,G:17,H:16,I:31,J:31,K:20,L:24,M:13,N:16,O:16,P:21,Q:16,R:20,S:24,T:21,U:17,V:21,W:13,X:21,Y:22,Z:22};

function fillRatio(str) {
  let r = 0;
  for (const ch of String(str)) {
    if (LC[ch])      r += 1 / LC[ch];
    else if (UC[ch]) r += 1 / UC[ch];
    else             r += 1 / 20; // digits, spaces, symbols — conservative
  }
  return r;
}

// Returns HTML with the characters that push the name past the display limit highlighted in red.
// SPLIT_THRESHOLD is calibrated from confirmed pump behavior. Confirmed fits (actual pump screen):
//   "EPINEPHrine mcg/kg/min" ratio 1.077, "NORepinephrine mcg/min" ratio 1.086,
//   "NORepinephrine mcg/kg/" ratio 1.073, "NORepinephri mcg/kg/mn" ratio 1.104 — all fit.
//   Threshold set to 1.13; "NORepinephrine mcg/kg/min" (1.232) still splits correctly at '/'.
// Names flagged by Rule 9 always have ratio > 1.13, so splitIdx is always found.
function buildOverflowHtml(str) {
  const SPLIT_THRESHOLD = 1.13;
  let ratio = 0;
  let splitIdx = -1;
  for (let i = 0; i < str.length; i++) {
    const ch = str[i];
    const charRatio = LC[ch] ? 1/LC[ch] : UC[ch] ? 1/UC[ch] : 1/20;
    ratio += charRatio;
    if (ratio > SPLIT_THRESHOLD && splitIdx === -1) splitIdx = i;
  }
  if (splitIdx === -1) return `<span class="name-fits">${escHtml(str)}</span>`;
  return `<span class="name-fits">${escHtml(str.slice(0, splitIdx))}</span><span class="name-over" title="These characters exceed the display width">${escHtml(str.slice(splitIdx))}</span>`;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
const isEmpty = v => v === null || v === undefined || v === '';

function isMLUnit(unit) {
  if (!unit) return false;
  const u = String(unit).trim().toLowerCase();
  return u === 'ml' || u.startsWith('ml/');
}

// Rate-based = dose unit ends in a per-minute or per-hour token (e.g. mg/hr, mcg/kg/min)
function isRateBasedUnit(unit) {
  if (!unit) return false;
  const HOUR_TOKENS = ['h', 'hr', 'hour', 'hrs', 'hours'];
  const MIN_TOKENS = ['m', 'min', 'minute', 'mins', 'minutes'];
  const lastToken = String(unit).toLowerCase().split('/').pop().trim();
  return HOUR_TOKENS.includes(lastToken) || MIN_TOKENS.includes(lastToken);
}

function hasExcessDecimals(val) {
  if (typeof val !== 'number') return false;
  const s = val.toPrecision(15).replace(/0+$/, '');
  if (!s.includes('.')) return false;
  return s.split('.')[1].length > 3;
}

function colLetter(idx) {
  let col = '';
  let n = idx + 1;
  while (n > 0) {
    const rem = (n - 1) % 26;
    col = String.fromCharCode(65 + rem) + col;
    n = Math.floor((n - 1) / 26);
  }
  return col;
}

// ── Rule 14: Known IV drug reference list (canonical spelling) ───────────────
const KNOWN_DRUGS_CANONICAL = [
  // Pharmacist-provided common drugs:
  'Adenosine','Alprostadil','Alteplase','Amiodarone','Argatroban','Atracurium',
  'Bivalirudin','Bumetanide','Cisatracurium','Clevidipine','Dexmedetomidine',
  'Diltiazem','Dobutamine','Dopamine','Epinephrine','Eptifibatide','Esmolol',
  'Fenoldopam','Fentanyl','Furosemide','Heparin','Hydromorphone','Insulin',
  'Isoproterenol','Ketamine','Labetalol','Lidocaine','Lorazepam','Midazolam',
  'Milrinone','Morphine','Naloxone','Nesiritide','Nicardipine','Nitroglycerin',
  'Nitroprusside','Norepinephrine','Octreotide','Pancuronium','Pantoprazole',
  'Pentobarbital','Phenylephrine','Procainamide','Propofol','Remifentanil',
  'Rocuronium','Sufentanil','Vasopressin',
  // Additional common IV medications:
  'Acetaminophen','Albumin','Amikacin','Aminophylline','Azithromycin',
  'Cefazolin','Ceftriaxone','Ciprofloxacin','Clindamycin','Daptomycin',
  'Dexamethasone','Digoxin','Enalaprilat','Fluconazole','Gentamicin',
  'Hydralazine','Hydrocortisone','Levofloxacin','Mannitol','Meropenem',
  'Metoprolol','Metronidazole','Methylprednisolone','Nalbuphine','Nimodipine',
  'Phenobarbital','Tobramycin','Vancomycin','Vecuronium','Voriconazole',
];
// Map: lowercase → canonical (for fast lookup and suggestion display)
const KNOWN_DRUGS_MAP = new Map(KNOWN_DRUGS_CANONICAL.map(d => [d.toLowerCase(), d]));

// Levenshtein edit distance (optimized: bails early if lengths differ > 3)
function levenshtein(a, b) {
  if (Math.abs(a.length - b.length) > 3) return 99;
  const row = Array.from({length: b.length + 1}, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    let prev = row[0];
    row[0] = i;
    for (let j = 1; j <= b.length; j++) {
      const tmp = row[j];
      row[j] = a[i-1] === b[j-1] ? prev : 1 + Math.min(prev, row[j], row[j-1]);
      prev = tmp;
    }
  }
  return row[b.length];
}

// Returns boolean[] marking which positions in `a` are "wrong" relative to `b` (both lowercase).
// Uses full DP matrix + backtrace so consecutive wrong chars stay grouped.
function wrongPositions(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) =>
    Array.from({length: n + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
    }
  }
  const wrong = new Array(m).fill(false);
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) {
      i--; j--;
    } else {
      const sub = (i > 0 && j > 0) ? dp[i-1][j-1] : Infinity;
      const del = i > 0 ? dp[i-1][j] : Infinity;
      const ins = j > 0 ? dp[i][j-1] : Infinity;
      if (sub <= del && sub <= ins) { wrong[--i] = true; j--; }  // substitution
      else if (del <= ins)          { wrong[--i] = true; }        // deletion (extra char)
      else                          { j--; }                      // insertion (missing char)
    }
  }
  return wrong;
}

// Natural sort: compares strings treating embedded digit runs numerically
function naturalCompare(a, b) {
  // Primary: if both strings contain numbers, sort by the first number found anywhere.
  // This catches cases like "Single (1mg/mL)" vs "Double (2mg/mL)" vs "QUAD (4mg/mL)"
  // where the embedded concentration number (1, 2, 4) conveys the intended order but the
  // leading words (D < Q < S) would sort them incorrectly on the pump.
  const numA = String(a).match(/\d+\.?\d*/);
  const numB = String(b).match(/\d+\.?\d*/);
  if (numA && numB) {
    const diff = parseFloat(numA[0]) - parseFloat(numB[0]);
    if (diff !== 0) return diff;
  }
  // Fallback: left-to-right segment comparison, treating digit runs numerically.
  // Preserves detection of "5 mcg/min" vs "10 mcg/min" when the text prefix is identical.
  const pa = String(a).match(/\d+|\D+/g) || [];
  const pb = String(b).match(/\d+|\D+/g) || [];
  const len = Math.min(pa.length, pb.length);
  for (let i = 0; i < len; i++) {
    if (/^\d+$/.test(pa[i]) && /^\d+$/.test(pb[i])) {
      const diff = parseInt(pa[i], 10) - parseInt(pb[i], 10);
      if (diff !== 0) return diff;
    } else {
      const lc = pa[i].toLowerCase().localeCompare(pb[i].toLowerCase());
      if (lc !== 0) return lc;
    }
  }
  return pa.length - pb.length;
}

// Pump sort: case-insensitive for letters (A=a), non-letters by raw code point.
// Space (32) and most symbols sort BEFORE letters; ~ (126) and chars > 'z' (122) sort AFTER.
function pumpCompare(aStr, bStr) {
  const norm = c => {
    const n = c.charCodeAt(0);
    return (n >= 65 && n <= 90) ? n + 32 : n; // uppercase → lowercase code point
  };
  for (let i = 0; i < Math.min(aStr.length, bStr.length); i++) {
    const d = norm(aStr[i]) - norm(bStr[i]);
    if (d !== 0) return d;
  }
  return aStr.length - bStr.length;
}

// ─── Main validation ──────────────────────────────────────────────────────────
function validate(workbook) {
  const allIssues = [];
  const dupGroups = new Map();    // Rule 1: pairKey → [loc, ...]
  const dosingGroups = new Map(); // Rule 10: "sheet|||care|||drug" → [{dosing, row}]
  const drugOrderMap = new Map(); // Rule 13: "sheet|||care" → { sheet, care, drugs: [{name, row}] }

  for (const sheetName of workbook.SheetNames) {
    const ws = workbook.Sheets[sheetName];
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

    // Skip sheets where the only drug entries are Rate Mode rows (no actual drug library content)
    const rowsWithDrug = data.slice(3).filter(r => r && !r.every(isEmpty) && !isEmpty(r[C.DRUG_NAME]));
    if (rowsWithDrug.length > 0 &&
        rowsWithDrug.every(r => String(r[C.DRUG_NAME]).trim().toLowerCase().startsWith('rate mode'))) {
      continue; // entire sheet is Rate Mode only — skip all checks
    }

    // Detect if Quick Recall column (AV = index 47) exists on this sheet
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
    const hasQuickRecall = range.e.c >= 47;

    // Data rows start at index 3 (Excel row 4)
    for (let ri = 3; ri < data.length; ri++) {
      const row = data[ri] || [];
      const excelRow = ri + 1;

      // Skip completely blank rows
      if (row.every(isEmpty)) continue;

      const careArea  = row[C.CARE_AREA];
      const drugName  = row[C.DRUG_NAME];
      const dosingName = row[C.DOSING_NAME];

      // Skip if row has no drug context at all
      if (isEmpty(careArea) && isEmpty(drugName) && isEmpty(dosingName)) continue;

      const loc = { sheet: sheetName, row: excelRow, care: careArea, drug: drugName, dosing: dosingName };

      // ── Rule 1: Collect all rows per care-area + drug + dosing key ───────
      const pairKey = `${sheetName}||${String(careArea||'').trim().toLowerCase()}||${String(drugName||'').trim().toLowerCase()}||${String(dosingName||'').trim().toLowerCase()}`;
      if (!dupGroups.has(pairKey)) dupGroups.set(pairKey, []);
      dupGroups.get(pairKey).push(loc);

      // ── Rule 10: Collect dosing names per (sheet, care area, drug) ───────
      const ordKey = `${sheetName}|||${String(careArea||'').trim()}|||${String(drugName||'').trim()}`;
      if (!dosingGroups.has(ordKey)) dosingGroups.set(ordKey, []);
      dosingGroups.get(ordKey).push({ dosing: String(dosingName||''), row: excelRow });

      // ── Rule 13: Collect drug names per (sheet, care area) in template order
      if (!isEmpty(drugName) && !String(drugName).trim().toLowerCase().startsWith('rate mode')) {
        const caKey13 = `${sheetName}|||${String(careArea||'').trim()}`;
        if (!drugOrderMap.has(caKey13)) drugOrderMap.set(caKey13, { sheet: sheetName, care: careArea, drugs: [] });
        const d13 = drugOrderMap.get(caKey13);
        const dn = String(drugName).trimEnd(); // keep leading spaces (intentional sort keys) but strip trailing
        if (!d13.drugs.some(x => x.name.toLowerCase() === dn.toLowerCase())) {
          d13.drugs.push({ name: dn, row: excelRow });
        }
      }

      // ── Rule 5: Required fields ───────────────────────────────────────────
      if (isEmpty(careArea))   allIssues.push({ rule: 5, ...loc, msg: 'Care Area Name (col B) is empty' });
      if (isEmpty(drugName))   allIssues.push({ rule: 5, ...loc, msg: 'Drug Name (col C) is empty' });
      if (isEmpty(dosingName)) allIssues.push({ rule: 5, ...loc, msg: 'Dosing Name (col D) is empty' });
      if (isEmpty(row[C.PRI_UNIT]))  allIssues.push({ rule: 5, ...loc, msg: 'Primary Dose Unit (col I) is empty' });
      if (isEmpty(row[C.KVO_MODE])) allIssues.push({ rule: 5, ...loc, msg: 'KVO Mode (col AT) is empty' });
      if (hasQuickRecall && isEmpty(row[C.QUICK_RCL])) {
        allIssues.push({ rule: 5, ...loc, msg: 'Quick Recall (col AV) is empty — required when this column is present' });
      }

      // ── Rule 2: mL-based Primary Dose Unit → cols E–H must be blank ──────
      if (isMLUnit(row[C.PRI_UNIT])) {
        const mCheck = [
          [C.CONC_UNIT, 'E (Conc Unit)'],
          [C.CONC_AMT,  'F (Conc Amount)'],
          [C.DIL_UNIT,  'G (Diluent Unit)'],
          [C.DIL_AMT,   'H (Diluent Amount)'],
        ];
        for (const [idx, label] of mCheck) {
          if (!isEmpty(row[idx])) {
            allIssues.push({ rule: 2, ...loc, msg: `Primary Dose Unit is mL-based ("${row[C.PRI_UNIT]}") — col ${label} must be blank but has value "${row[idx]}"` });
          }
        }
      }

      // ── Rule 15: Bolus/Loading dose units must match mL vs non-mL of Primary ─
      const priIsMl = isMLUnit(row[C.PRI_UNIT]);
      const secUnits15 = [
        [C.BOL_UNIT, 'T (Bolus Dose Unit)',    'Bolus'],
        [C.LOD_UNIT, 'AE (Loading Dose Unit)', 'Loading'],
      ];
      for (const [idx, label, section] of secUnits15) {
        const secUnit = row[idx];
        if (isEmpty(secUnit)) continue;
        const secIsMl = isMLUnit(secUnit);
        if ((priIsMl && !secIsMl) || (!priIsMl && secIsMl && !isEmpty(row[C.PRI_UNIT]))) {
          allIssues.push({ rule: 15, ...loc,
            r15pri: { label: 'Primary (col I)',          value: String(row[C.PRI_UNIT]), isMl: priIsMl },
            r15sec: { label: `${section} (col ${label.split(' ')[0]})`, value: String(secUnit),         isMl: secIsMl },
            msg: `Primary Dose Unit "${row[C.PRI_UNIT]}" vs ${section} Dose Unit "${secUnit}" — mL dose units are only compatible with other mL dose units`,
          });
        }
      }

      // ── Rule 16: Bolus/Loading fields must be blank if primary unit is not /min or /hr ──
      if (!isEmpty(row[C.PRI_UNIT])) {
        const isRateBased = isRateBasedUnit(row[C.PRI_UNIT]);
        if (!isRateBased) {
          const bolCols = [C.BOL_UNIT,C.BOL_INIT,C.BOL_UH,C.BOL_LH,C.BOL_US,C.BOL_LS,C.BOL_T_INIT,C.BOL_T_UH,C.BOL_T_LH,C.BOL_T_US,C.BOL_T_LS];
          const lodCols = [C.LOD_UNIT,C.LOD_INIT,C.LOD_UH,C.LOD_LH,C.LOD_US,C.LOD_LS,C.LOD_T_INIT,C.LOD_T_UH,C.LOD_T_LH,C.LOD_T_US,C.LOD_T_LS];
          const bolFilled = bolCols.some(idx => !isEmpty(row[idx]));
          const lodFilled = lodCols.some(idx => !isEmpty(row[idx]));
          if (bolFilled || lodFilled) {
            const r16sections = [];
            if (bolFilled) r16sections.push({ label: 'Bolus (col T)', value: !isEmpty(row[C.BOL_UNIT]) ? String(row[C.BOL_UNIT]) : '(no unit)' });
            if (lodFilled) r16sections.push({ label: 'Loading (col AE)', value: !isEmpty(row[C.LOD_UNIT]) ? String(row[C.LOD_UNIT]) : '(no unit)' });
            allIssues.push({ rule: 16, ...loc,
              r16priUnit: String(row[C.PRI_UNIT]),
              r16sections,
              msg: `Primary Dose Unit "${row[C.PRI_UNIT]}" is not rate-based (/min or /hr) — bolus and loading fields must be blank`,
            });
          }
        }
      }

      // ── Rule 3: Limits in descending order ───────────────────────────────
      const limitSets = [
        { section: 'Primary',  vals: [
          { lbl: 'Upper Hard (K)', v: row[C.PRI_UH] },
          { lbl: 'Upper Soft (M)', v: row[C.PRI_US] },
          { lbl: 'Initial Dose (J)', v: row[C.PRI_INIT] },
          { lbl: 'Lower Soft (N)', v: row[C.PRI_LS] },
          { lbl: 'Lower Hard (L)', v: row[C.PRI_LH] },
        ]},
        { section: 'Bolus', vals: [
          { lbl: 'Upper Hard (V)', v: row[C.BOL_UH] },
          { lbl: 'Upper Soft (X)', v: row[C.BOL_US] },
          { lbl: 'Initial Dose (U)', v: row[C.BOL_INIT] },
          { lbl: 'Lower Soft (Y)', v: row[C.BOL_LS] },
          { lbl: 'Lower Hard (W)', v: row[C.BOL_LH] },
        ]},
        { section: 'Loading', vals: [
          { lbl: 'Upper Hard (AG)', v: row[C.LOD_UH] },
          { lbl: 'Upper Soft (AI)', v: row[C.LOD_US] },
          { lbl: 'Initial Dose (AF)', v: row[C.LOD_INIT] },
          { lbl: 'Lower Soft (AJ)', v: row[C.LOD_LS] },
          { lbl: 'Lower Hard (AH)', v: row[C.LOD_LH] },
        ]},
        { section: 'Weight (kg)', vals: [
          { lbl: 'Upper Hard (AP)', v: row[C.WT_UH] },
          { lbl: 'Upper Soft (AR)', v: row[C.WT_US] },
          { lbl: 'Lower Soft (AS)', v: row[C.WT_LS] },
          { lbl: 'Lower Hard (AQ)', v: row[C.WT_LH] },
        ]},
      ];

      for (const { section, vals } of limitSets) {
        const filled = vals.filter(x => typeof x.v === 'number');
        for (let i = 0; i < filled.length - 1; i++) {
          if (filled[i].v < filled[i + 1].v) {
            allIssues.push({ rule: 3, ...loc, msg: `${section} limits out of order: ${filled[i].lbl} (${filled[i].v}) < ${filled[i+1].lbl} (${filled[i+1].v})` });
          }
        }
      }

      // ── Rule 3 (time limits): same descending order check for time columns ─
      const fmtTime = v => {
        const totalSec = Math.round(v * 86400);
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      };
      const timeLimitSets = [
        { section: 'Primary Time', vals: [
          { lbl: 'Upper Hard (P)', v: row[C.PRI_T_UH] },
          { lbl: 'Upper Soft (R)', v: row[C.PRI_T_US] },
          { lbl: 'Initial Time (O)', v: row[C.PRI_T_INIT] },
          { lbl: 'Lower Soft (S)', v: row[C.PRI_T_LS] },
          { lbl: 'Lower Hard (Q)', v: row[C.PRI_T_LH] },
        ]},
        { section: 'Bolus Time', vals: [
          { lbl: 'Upper Hard (AA)', v: row[C.BOL_T_UH] },
          { lbl: 'Upper Soft (AC)', v: row[C.BOL_T_US] },
          { lbl: 'Initial Time (Z)', v: row[C.BOL_T_INIT] },
          { lbl: 'Lower Soft (AD)', v: row[C.BOL_T_LS] },
          { lbl: 'Lower Hard (AB)', v: row[C.BOL_T_LH] },
        ]},
        { section: 'Loading Time', vals: [
          { lbl: 'Upper Hard (AL)', v: row[C.LOD_T_UH] },
          { lbl: 'Upper Soft (AN)', v: row[C.LOD_T_US] },
          { lbl: 'Initial Time (AK)', v: row[C.LOD_T_INIT] },
          { lbl: 'Lower Soft (AO)', v: row[C.LOD_T_LS] },
          { lbl: 'Lower Hard (AM)', v: row[C.LOD_T_LH] },
        ]},
      ];
      for (const { section, vals } of timeLimitSets) {
        // Only compare valid time fractions (0 < v ≤ 1); skip strings/bad values caught by Rule 11
        const filled = vals.filter(x => typeof x.v === 'number' && x.v > 0 && x.v <= 1);
        for (let i = 0; i < filled.length - 1; i++) {
          if (filled[i].v < filled[i + 1].v) {
            allIssues.push({ rule: 3, ...loc,
              msg: `${section} limits out of order: ${filled[i].lbl} (${fmtTime(filled[i].v)}) < ${filled[i+1].lbl} (${fmtTime(filled[i+1].v)})`
            });
          }
        }
      }

      // ── Rule 4: No more than 3 decimal places ────────────────────────────
      const numericFields = [
        [C.PRI_INIT,'J (Primary Initial)'], [C.PRI_UH,'K (Primary Upper Hard)'],
        [C.PRI_LH, 'L (Primary Lower Hard)'],[C.PRI_US,'M (Primary Upper Soft)'],
        [C.PRI_LS, 'N (Primary Lower Soft)'],[C.BOL_INIT,'U (Bolus Initial)'],
        [C.BOL_UH, 'V (Bolus Upper Hard)'],[C.BOL_LH,'W (Bolus Lower Hard)'],
        [C.BOL_US, 'X (Bolus Upper Soft)'], [C.BOL_LS,'Y (Bolus Lower Soft)'],
        [C.LOD_INIT,'AF (Loading Initial)'],[C.LOD_UH,'AG (Loading Upper Hard)'],
        [C.LOD_LH, 'AH (Loading Lower Hard)'],[C.LOD_US,'AI (Loading Upper Soft)'],
        [C.LOD_LS, 'AJ (Loading Lower Soft)'],[C.WT_UH,'AP (Weight Upper Hard)'],
        [C.WT_LH,  'AQ (Weight Lower Hard)'], [C.WT_US,'AR (Weight Upper Soft)'],
        [C.WT_LS,  'AS (Weight Lower Soft)'],
      ];
      for (const [idx, label] of numericFields) {
        if (hasExcessDecimals(row[idx])) {
          allIssues.push({ rule: 4, ...loc, msg: `Col ${label} = ${row[idx]} — more than 3 decimal places (minimum precision is 0.001)` });
        }
      }

      // ── Rules 6 & 7: KVO Mode / KVO Rate ────────────────────────────────
      const kvoMode = row[C.KVO_MODE];
      const kvoRate = row[C.KVO_RATE];
      let kvoRateAlreadyFlagged = false; // set when Rule 6/7 already flags this cell, so Rule 17 doesn't double-report
      if (!isEmpty(kvoMode)) {
        const km = String(kvoMode).trim().toLowerCase();
        if (km === 'rate') {
          if (isEmpty(kvoRate)) {
            allIssues.push({ rule: 6, ...loc, msg: 'KVO Mode is "Rate" but KVO Rate (col AU) is blank — must enter a value between 0.4 and 20 mL/hr' });
          } else if (typeof kvoRate === 'number' && (kvoRate < 0.4 || kvoRate > 20)) {
            allIssues.push({ rule: 6, ...loc, msg: `KVO Mode is "Rate" but KVO Rate ${kvoRate} mL/hr is outside the allowed range of 0.4–20 mL/hr` });
            kvoRateAlreadyFlagged = true;
          }
        } else if (km === 'off' || km === 'continue primary rate') {
          if (!isEmpty(kvoRate)) {
            allIssues.push({ rule: 7, ...loc, msg: `KVO Mode is "${kvoMode}" — KVO Rate (col AU) must be blank, but has value ${kvoRate}` });
            kvoRateAlreadyFlagged = true;
          }
        }
      }

      // ── Rule 17: KVO Rate (col AU) must be blank or a number between 0.4 and 20 (any mode) ──
      // Universal value check on the cell, independent of KVO Mode. Skipped when Rule 6/7 already
      // flagged this same cell, so a single problem isn't reported twice.
      if (!isEmpty(kvoRate) && !kvoRateAlreadyFlagged) {
        if (typeof kvoRate !== 'number') {
          allIssues.push({ rule: 17, ...loc, msg: `KVO Rate (col AU) = "${kvoRate}" is not a number — it must be blank or a number between 0.4 and 20 mL/hr` });
        } else if (kvoRate < 0.4 || kvoRate > 20) {
          allIssues.push({ rule: 17, ...loc, msg: `KVO Rate (col AU) = ${kvoRate} is outside the allowed range — it must be blank or a number between 0.4 and 20 mL/hr` });
        }
      }

      // ── Rule 8: Weight values 0.1–350 kg ─────────────────────────────────
      const weightFields = [
        [C.WT_UH,'AP (Weight Upper Hard)'],[C.WT_LH,'AQ (Weight Lower Hard)'],
        [C.WT_US,'AR (Weight Upper Soft)'],[C.WT_LS,'AS (Weight Lower Soft)'],
      ];
      for (const [idx, label] of weightFields) {
        const v = row[idx];
        if (typeof v === 'number' && (v < 0.1 || v > 350)) {
          allIssues.push({ rule: 8, ...loc, msg: `Col ${label} weight ${v} kg is outside the allowed range of 0.1–350 kg` });
        }
      }

      // ── Rule 9: Name fits in display field ───────────────────────────────
      const nameFields = [
        { label: 'Care Area (col B)', val: careArea },
        { label: 'Drug Name (col C)', val: drugName },
        { label: 'Dosing Name (col D)', val: dosingName },
      ];
      for (const { label, val } of nameFields) {
        if (!isEmpty(val)) {
          const s = String(val);
          const ratio = fillRatio(s);
          if (ratio > 1.13) {
            const pct = Math.round(ratio * 100);
            allIssues.push({
              rule: 9, ...loc,
              msg: `${label} "${s}" exceeds display width (${pct}% of capacity)`,
              r9label: label,
              r9val: s,
              r9pct: pct,
            });
          }
        }
      }

      // ── Rule 11: Time limit columns must be hh:mm:ss (numeric fraction) ──
      for (const { idx, label } of TIME_COLS) {
        const v = row[idx];
        if (isEmpty(v)) continue;
        if (typeof v === 'string') {
          allIssues.push({ rule: 11, ...loc,
            msg: `Col ${label} contains "${v}" — this looks like a rate from another pump system. Must be hh:mm:ss time duration (how long the bolus/infusion should run), not a rate or text.`
          });
        } else if (typeof v === 'number' && v > 1) {
          allIssues.push({ rule: 11, ...loc,
            msg: `Col ${label} contains the value ${v} which exceeds 24 hours — likely entered as a rate (e.g. mL/hr or mcg/hr) from another pump system. Must be converted to hh:mm:ss duration.`
          });
        } else if (typeof v === 'number' && v <= 0 && idx === C.BOL_T_INIT) {
          // Bolus Initial Time of 0 is equivalent to leaving it blank — acceptable
        } else if (typeof v === 'number' && v <= 0 && idx === C.PRI_T_INIT && !isRateBasedUnit(row[C.PRI_UNIT])) {
          // Primary Initial Time of 0 is acceptable when Primary Dose Unit is not rate-based (/min or /hr)
        } else if (typeof v === 'number' && v <= 0 && idx === C.LOD_T_INIT && !isRateBasedUnit(row[C.LOD_UNIT])) {
          // Loading Initial Time of 0 is acceptable when Loading Dose Unit is not rate-based (/min or /hr)
        } else if (typeof v === 'number' && v <= 0) {
          allIssues.push({ rule: 11, ...loc,
            msg: `Col ${label} contains ${v} — must be a positive hh:mm:ss time duration greater than 00:00:00.`
          });
        }
        // 0 < v ≤ 1 is a valid Excel time fraction (hh:mm:ss within 24 hours) — no issue
      }

      // ── Rule 12: Conc Unit (E) must be blank when Conc Amount (F) and Diluent Amount (H) are both blank
      if (!isEmpty(row[C.CONC_UNIT]) && isEmpty(row[C.CONC_AMT]) && isEmpty(row[C.DIL_AMT])) {
        allIssues.push({ rule: 12, ...loc,
          msg: `Conc Unit (col E) = "${row[C.CONC_UNIT]}" but Conc Amount (col F) and Diluent Amount (col H) are both blank. Either add numeric values to F and H, or clear col E to use wildcard concentration.`
        });
      }

      // ── Rule 18: Conc Amount (col F) & Diluent Amount (col H) must be a number or blank ──
      // These columns hold numeric amounts only. Text like "mcg" or "mL" belongs in the matching
      // unit column (E for F, G for H) — a letter/unit value in an amount column is a data-entry error.
      const amountChecks = [
        { idx: C.CONC_AMT, label: 'Conc Amount (col F)',    unitCol: 'Conc Unit (col E)' },
        { idx: C.DIL_AMT,  label: 'Diluent Amount (col H)', unitCol: 'Diluent Unit (col G)' },
      ];
      for (const { idx, label, unitCol } of amountChecks) {
        const amt = row[idx];
        if (isEmpty(amt)) continue;
        const amtIsNumber = typeof amt === 'number'
          ? isFinite(amt)
          : /^[+-]?(\d+\.?\d*|\.\d+)$/.test(String(amt).trim());
        if (!amtIsNumber) {
          allIssues.push({ rule: 18, ...loc,
            msg: `${label} = "${amt}" must be a number or left blank — it cannot contain letters or units (e.g. "mcg", "mL"). The unit belongs in ${unitCol}.`
          });
        }
      }

      // ── Rule 19: Conc Unit (col E) & Diluent Unit (col G) must be letters or blank (no numbers) ──
      // These are unit columns (e.g. "mg", "mcg", "mL"). A digit here usually means a numeric amount
      // was entered in the unit column by mistake — the amount belongs in the matching amount column
      // (F for E, H for G). Mirror of Rule 18.
      const unitChecks = [
        { idx: C.CONC_UNIT, label: 'Conc Unit (col E)',    amtCol: 'Conc Amount (col F)' },
        { idx: C.DIL_UNIT,  label: 'Diluent Unit (col G)', amtCol: 'Diluent Amount (col H)' },
      ];
      for (const { idx, label, amtCol } of unitChecks) {
        const unit = row[idx];
        if (isEmpty(unit)) continue;
        if (/\d/.test(String(unit))) {
          allIssues.push({ rule: 19, ...loc,
            msg: `${label} = "${unit}" must contain only a unit (letters) or be left blank — it cannot contain numbers. The numeric amount belongs in ${amtCol}.`
          });
        }
      }

      // ── Rule 14: Drug name spelling ────────────────────────────────────────
      if (!isEmpty(drugName) && !String(drugName).trim().toLowerCase().startsWith('rate mode')) {
        const trimmedDrug = String(drugName).trimEnd();
        // Extract first alphabetic run (handles Tallman lettering like EPINEPHrine, leading spaces)
        const firstWord = trimmedDrug.trim().match(/^([A-Za-z]{4,})/);
        if (firstWord) {
          const normalized = firstWord[1].toLowerCase();
          if (!KNOWN_DRUGS_MAP.has(normalized)) {
            // Find the closest known drug by edit distance
            let bestMatch = null, bestDist = Infinity;
            for (const [lcName, canonical] of KNOWN_DRUGS_MAP) {
              const d = levenshtein(normalized, lcName);
              if (d < bestDist) { bestDist = d; bestMatch = canonical; }
            }
            // Flag if within threshold: ≤1 edit for shorter names, ≤2 for names ≥10 chars
            const threshold = normalized.length >= 10 ? 2 : 1;
            if (bestMatch && bestDist > 0 && bestDist <= threshold) {
              const wrong = wrongPositions(normalized, bestMatch.toLowerCase());
              const rest = trimmedDrug.trim().slice(firstWord[1].length); // suffix after first word
              allIssues.push({ rule: 14, ...loc,
                r14word: firstWord[1],   // original-case first word
                r14wrong: wrong,         // boolean[] marking wrong chars
                r14rest: rest,           // rest of name after first word (suffix)
                r14suggestion: bestMatch,
                r14dist: bestDist,
                msg: `"${trimmedDrug.trim()}" may be misspelled — did you mean "${bestMatch}"? (${bestDist} letter ${bestDist === 1 ? 'difference' : 'differences'})`,
              });
            }
          }
        }
      }

    } // end row loop
  } // end sheet loop

  // ── Rule 1 finalization: emit one dup_group issue per duplicate set ────
  for (const [, locs] of dupGroups) {
    if (locs.length > 1) {
      allIssues.push({
        rule: 1,
        type: 'dup_group',
        locs,
        drug: locs[0].drug,
        dosing: locs[0].dosing,
        care: locs[0].care,
        sheet: locs[0].sheet,
        row: locs[0].row,
      });
    }
  }

  // ── Rule 10 finalization: detect when pump alphabetical order differs from template entry order ─
  for (const [ordKey, entries] of dosingGroups) {
    if (entries.length < 2) continue;
    const [sheet, care, drug] = ordKey.split('|||');

    // Pump order: case-insensitive, space/symbols < letters < ~ (tilde sorts after z).
    const alphaOrder = [...entries].sort((a, b) => pumpCompare(a.dosing, b.dosing));

    // Compare pump order vs template entry order (not natural sort)
    const alphaKeys    = alphaOrder.map(e => e.dosing);
    const templateKeys = entries.map(e => e.dosing);
    const hasInversion = alphaKeys.join('\x00') !== templateKeys.join('\x00');

    // Entries starting with space or non-alphanumeric
    const symbolEntries = entries.filter(e => e.dosing.length > 0 && /^[^a-zA-Z0-9]/.test(e.dosing));

    if (!hasInversion) continue; // only flag when pump order ≠ template entry order

    // Entries that appear earlier in the template than the pump would place them.
    // These would benefit from a leading space/symbol to preserve the intended order.
    const needsFix = entries
      .map((e, templateIdx) => {
        const alphaIdx = alphaKeys.indexOf(e.dosing);
        return templateIdx < alphaIdx ? e : null;
      })
      .filter(Boolean);

    allIssues.push({
      rule: 10,
      type: 'ordering_group',
      sheet, care, drug,
      row: entries[0].row,
      entries,        // original template order
      alphaOrder,     // pump display order
      hasInversion,
      symbolEntries,
      needsFix,
    });
  }

  // ── Rule 13 finalization: drug name order within each care area ─────────
  for (const [, { sheet, care, drugs }] of drugOrderMap) {
    if (drugs.length < 2) continue;
    // Pump order: case-insensitive, space/symbols < letters < ~ (tilde sorts after z).
    const alphaOrder = [...drugs].sort((a, b) => pumpCompare(a.name, b.name));
    const alphaKeys    = alphaOrder.map(e => e.name.toLowerCase());
    const templateKeys = drugs.map(e => e.name.toLowerCase());
    const orderMatches = alphaKeys.join('\x00') === templateKeys.join('\x00');
    const symbolDrugs  = drugs.filter(d => d.name.length > 0 && /^[^a-zA-Z0-9]/.test(d.name));
    if (orderMatches) continue; // only flag when pump order differs from template order
    allIssues.push({
      rule: 13,
      type: 'drug_order_group',
      sheet, care, drug: null, dosing: null, row: drugs[0].row,
      drugs,        // [{name, row}] in template order
      alphaOrder,   // [{name, row}] in pump (alphabetical) order
      orderMatches,
      symbolDrugs,
    });
  }

  return allIssues;
}

// ─── Render results ───────────────────────────────────────────────────────────
const RULE_INFO = {
  1: { title: 'Rule 1 — Duplicate Drug + Dosing Name', severity: 'err' },
  2: { title: 'Rule 2 — mL-based Unit with Concentration Data', severity: 'err' },
  3: { title: 'Rule 3 — Limits Not in Descending Order', severity: 'err' },
  4: { title: 'Rule 4 — Too Many Decimal Places (max 0.001)', severity: 'err' },
  5: { title: 'Rule 5 — Required Field Missing', severity: 'err' },
  6: { title: 'Rule 6 — KVO Rate Missing or Out of Range (Rate mode)', severity: 'err' },
  7: { title: 'Rule 7 — KVO Rate Should Be Blank (Off / Continue Primary Rate)', severity: 'warn' },
  8: { title: 'Rule 8 — Weight Outside 0.1–350 kg', severity: 'err' },
  9: { title: 'Rule 9 — Name Too Long for Display Field', severity: 'warn' },
  10: { title: 'Rule 10 — Alphabetical Order May Surprise Clinicians', severity: 'warn' },
  11: { title: 'Rule 11 — Time Limit Column Not in hh:mm:ss Format', severity: 'err' },
  12: { title: 'Rule 12 — Conc Unit Filled Without Conc Amount or Diluent Amount', severity: 'err' },
  13: { title: 'Rule 13 — Drug Display Order Within Care Area', severity: 'warn' },
  14: { title: 'Rule 14 — Drug Name Spelling Check', severity: 'warn' },
  15: { title: 'Rule 15 — Mismatched Dose Units (mL Primary with non-mL Bolus/Loading)', severity: 'err' },
  16: { title: 'Rule 16 — Bolus/Loading Fields Filled but Primary Unit is Not Rate-Based (/min or /hr)', severity: 'err' },
  17: { title: 'Rule 17 — KVO Rate Out of Range (must be blank or a number 0.4–20 mL/hr)', severity: 'err' },
  18: { title: 'Rule 18 — Conc Amount (col F) & Diluent Amount (col H) Must Be a Number or Blank (no letters/units)', severity: 'err' },
  19: { title: 'Rule 19 — Conc Unit (col E) & Diluent Unit (col G) Must Be Letters or Blank (no numbers)', severity: 'err' },
};

function renderResults(issues) {
  const summaryEl = document.getElementById('summary');
  const summaryGrid = document.getElementById('summary-grid');
  const resultsEl = document.getElementById('results');
  const noIssuesEl = document.getElementById('no-issues');

  summaryEl.style.display = 'block';
  resultsEl.style.display = 'block';
  noIssuesEl.style.display = 'none';
  resultsEl.innerHTML = '';

  // For Rule 1 dup_groups, count total flagged rows (sum of locs.length) for the summary
  const totalIssues = issues.reduce((sum, i) => sum + (i.type === 'dup_group' ? i.locs.length : 1), 0);
  const errCount = issues.reduce((sum, i) => sum + (RULE_INFO[i.rule].severity === 'err' ? (i.type === 'dup_group' ? i.locs.length : 1) : 0), 0);
  const warnCount = issues.reduce((sum, i) => sum + (RULE_INFO[i.rule].severity === 'warn' ? (i.type === 'dup_group' ? i.locs.length : 1) : 0), 0);
  const rulesClear = Object.keys(RULE_INFO).length - new Set(issues.map(i => i.rule)).size;

  summaryGrid.innerHTML = `
    <div class="stat-card ${totalIssues === 0 ? 'ok' : 'error'}">
      <div class="num">${totalIssues}</div>
      <div class="lbl">Total Issues</div>
    </div>
    <div class="stat-card ${errCount === 0 ? 'ok' : 'error'}">
      <div class="num">${errCount}</div>
      <div class="lbl">Errors</div>
    </div>
    <div class="stat-card ${warnCount === 0 ? 'ok' : 'error'}">
      <div class="num">${warnCount}</div>
      <div class="lbl">Warnings</div>
    </div>
    <div class="stat-card ok">
      <div class="num">${rulesClear}</div>
      <div class="lbl">Rules Passed</div>
    </div>
  `;

  if (totalIssues === 0) {
    noIssuesEl.style.display = 'block';
    resultsEl.style.display = 'none';
    return;
  }

  // Group by rule
  const byRule = {};
  for (const issue of issues) {
    if (!byRule[issue.rule]) byRule[issue.rule] = [];
    byRule[issue.rule].push(issue);
  }

  for (const ruleNum of Object.keys(RULE_INFO).sort((a,b) => a-b)) {
    const info = RULE_INFO[ruleNum];
    const ruleIssues = byRule[ruleNum] || [];
    const section = document.createElement('div');
    section.className = 'section';

    const headerClass = ruleIssues.length === 0 ? 'rule-ok' : (info.severity === 'warn' ? 'rule-warn' : 'rule-err');
    const badgeText = ruleIssues.length === 0
      ? '✓ Clear'
      : Number(ruleNum) === 1
        ? `${ruleIssues.length} duplicate set${ruleIssues.length !== 1 ? 's' : ''}`
        : Number(ruleNum) === 10
          ? `${ruleIssues.length} drug group${ruleIssues.length !== 1 ? 's' : ''}`
          : Number(ruleNum) === 13
          ? `${ruleIssues.length} care area${ruleIssues.length !== 1 ? 's' : ''}`
          : `${ruleIssues.length} issue${ruleIssues.length !== 1 ? 's' : ''}`;

    let bodyHtml;

    if (Number(ruleNum) === 1) {
      // Special rendering: show each duplicate group in its own bordered box
      if (ruleIssues.length === 0) {
        bodyHtml = '<div class="ok-banner">✅ No duplicate Drug + Dosing Name combinations found.</div>';
      } else {
        const groupsHtml = ruleIssues.map(issue => `
          <div class="dup-group">
            <div class="dup-group-header">
              <span class="dup-icon">⚠</span>
              <span>Duplicate: <strong>${escHtml(issue.drug)}</strong> / <strong>${escHtml(issue.dosing)}</strong>
              &nbsp;—&nbsp; ${issue.locs.length} entries in care area <strong>${escHtml(issue.care)}</strong>.
              Pharmacist must add a modifier to Drug Name or Dosing Name.</span>
            </div>
            <table>
              <thead><tr>
                <th>Sheet</th>
                <th>Care Area</th>
                <th>Excel Row</th>
                <th>Drug Name</th>
                <th>Dosing Name</th>
              </tr></thead>
              <tbody>
                ${issue.locs.map(loc => `
                  <tr>
                    <td><span class="sheet-tag">${escHtml(loc.sheet)}</span></td>
                    <td>${escHtml(loc.care || '—')}</td>
                    <td class="dup-row-num">Row ${loc.row}</td>
                    <td class="drug-col">${escHtml(loc.drug || '—')}</td>
                    <td>${escHtml(loc.dosing || '—')}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`).join('');
        bodyHtml = `<div class="dup-groups-wrap">${groupsHtml}</div>`;
      }
    } else if (Number(ruleNum) === 10) {
      // Special rendering: show pump order vs natural order side by side
      if (ruleIssues.length === 0) {
        bodyHtml = '<div class="ok-banner">✅ Pump display order matches template entry order for all dosing name groups.</div>';
      } else {
        const groupsHtml = ruleIssues.map(issue => {
          const alphaKeys    = issue.alphaOrder.map(e => e.dosing);
          const templateKeys = issue.entries.map(e => e.dosing);
          const fixNames     = issue.needsFix.map(e => e.dosing);

          // Build template-order column (left) — highlight entries that pump will reorder
          const templateRows = issue.entries.map((e, ti) => {
            const pi = alphaKeys.indexOf(e.dosing);
            const moved = pi !== ti;
            const needsSpace = fixNames.includes(e.dosing);
            const spaceHtml = needsSpace
              ? `<span class="space-indicator" title="Add a leading space before this name so it sorts earlier on the pump"></span>`
              : '';
            return `<div class="ord-entry ${moved ? 'moved' : 'same'}">${spaceHtml}${escHtml(e.dosing)}<span class="row-chip">Row ${e.row}</span></div>`;
          }).join('');

          // Build pump-order column (right) — highlight entries that differ from template position
          const pumpRows = issue.alphaOrder.map((e, pi) => {
            const ti = templateKeys.indexOf(e.dosing);
            const moved = pi !== ti;
            return `<div class="ord-entry ${moved ? 'moved' : 'same'}">${escHtml(e.dosing)}<span class="row-chip">Row ${e.row}</span></div>`;
          }).join('');

          // Fix recommendation
          let fixHtml = '';
          if (fixNames.length > 0) {
            const fixList = fixNames.map(n => `"${escHtml(n)}"`).join(', ');
            fixHtml = `<div class="ord-fix">💡 <strong>Fix:</strong> Add a leading space or symbol before ${fixList} to move it earlier in the pump's alphabetical display.</div>`;
          }

          // Symbol-prefix notes — split into "sorts before letters" vs "sorts after z" (~)
          let symbolHtml = '';
          if (issue.symbolEntries.length > 0) {
            const beforeEntries = issue.symbolEntries.filter(e => e.dosing.charCodeAt(0) <= 122);
            const afterEntries  = issue.symbolEntries.filter(e => e.dosing.charCodeAt(0) > 122);
            if (beforeEntries.length > 0) {
              const symList = beforeEntries.map(e => `"${escHtml(e.dosing)}" (Row ${e.row})`).join(', ');
              symbolHtml += `<div class="ord-symbol">ℹ️ <strong>Note:</strong> ${symList} starts with a space or symbol — it will sort <em>before</em> all letter entries on the pump. Verify this is intentional.</div>`;
            }
            if (afterEntries.length > 0) {
              const symList = afterEntries.map(e => `"${escHtml(e.dosing)}" (Row ${e.row})`).join(', ');
              symbolHtml += `<div class="ord-symbol">ℹ️ <strong>Note:</strong> ${symList} starts with ~ or a symbol after z — it will sort <em>after</em> all letter entries on the pump. Verify this is intentional.</div>`;
            }
          }

          return `
            <div class="ord-group">
              <div class="ord-group-header">
                🔤 <strong>${escHtml(issue.drug)}</strong> — care area: <strong>${escHtml(issue.care)}</strong>
                &nbsp;<span class="sheet-tag">${escHtml(issue.sheet)}</span>
              </div>
              <div class="ord-comparison">
                <div class="ord-col">
                  <div class="ord-col-title pump">📋 Template entry order</div>
                  ${templateRows}
                </div>
                <div class="ord-col">
                  <div class="ord-col-title natural">⚠ Pump will show (alphabetical)</div>
                  ${pumpRows}
                </div>
              </div>
              ${fixHtml}${symbolHtml}
            </div>`;
        }).join('');
        bodyHtml = `<div class="ord-groups-wrap">${groupsHtml}</div>`;
      }
    } else if (Number(ruleNum) === 13) {
      // Special rendering: show template entry order vs pump (alphabetical) order for drug names
      if (ruleIssues.length === 0) {
        bodyHtml = '<div class="ok-banner">✅ Drug names in every care area already match alphabetical order.</div>';
      } else {
        const groupsHtml = ruleIssues.map(issue => {
          const alphaKeySet = issue.alphaOrder.map(e => e.name.toLowerCase());
          const templateKeySet = issue.drugs.map(e => e.name.toLowerCase());

          const templateRows = issue.drugs.map((e, ti) => {
            const pi = alphaKeySet.indexOf(e.name.toLowerCase());
            const moved = pi !== ti;
            return `<div class="ord-entry ${moved ? 'moved' : 'same'}">${escHtml(e.name)}<span class="row-chip">Row ${e.row}</span></div>`;
          }).join('');

          const pumpRows = issue.alphaOrder.map((e, pi) => {
            const ti = templateKeySet.indexOf(e.name.toLowerCase());
            const moved = pi !== ti;
            return `<div class="ord-entry ${moved ? 'moved' : 'same'}">${escHtml(e.name)}<span class="row-chip">Row ${e.row}</span></div>`;
          }).join('');

          let symbolHtml = '';
          if (issue.symbolDrugs.length > 0) {
            const beforeDrugs = issue.symbolDrugs.filter(e => e.name.charCodeAt(0) <= 122);
            const afterDrugs  = issue.symbolDrugs.filter(e => e.name.charCodeAt(0) > 122);
            if (beforeDrugs.length > 0) {
              const symList = beforeDrugs.map(e => `"${escHtml(e.name)}" (Row ${e.row})`).join(', ');
              symbolHtml += `<div class="ord-symbol">ℹ️ <strong>Note:</strong> ${symList} starts with a space or symbol — it will sort <em>before</em> all letter entries on the pump. Verify this is intentional.</div>`;
            }
            if (afterDrugs.length > 0) {
              const symList = afterDrugs.map(e => `"${escHtml(e.name)}" (Row ${e.row})`).join(', ');
              symbolHtml += `<div class="ord-symbol">ℹ️ <strong>Note:</strong> ${symList} starts with ~ or a symbol after z — it will sort <em>after</em> all letter entries on the pump. Verify this is intentional.</div>`;
            }
          }

          return `
            <div class="ord-group">
              <div class="ord-group-header">
                🏥 Care area: <strong>${escHtml(issue.care || '—')}</strong>
                &nbsp;<span class="sheet-tag">${escHtml(issue.sheet)}</span>
              </div>
              <div class="ord-comparison">
                <div class="ord-col">
                  <div class="ord-col-title pump">📋 Template entry order</div>
                  ${templateRows}
                </div>
                <div class="ord-col">
                  <div class="ord-col-title natural">⚠ Pump will show (alphabetical)</div>
                  ${pumpRows}
                </div>
              </div>
              ${symbolHtml}
            </div>`;
        }).join('');
        bodyHtml = `<div class="ord-groups-wrap">${groupsHtml}</div>`;
      }
    } else {
      // Standard rendering for all other rules
      const stdBadge = ruleIssues.length === 0 ? '✓ Clear' : `${ruleIssues.length} issue${ruleIssues.length !== 1 ? 's' : ''}`;
      section.innerHTML = ''; // will rebuild below, just need badge fix
      bodyHtml = ruleIssues.length === 0
        ? '<div class="ok-banner">✅ No issues found for this rule.</div>'
        : `<table>
            <thead><tr>
              <th>Sheet / Care Area</th>
              <th>Excel Row</th>
              <th>Drug Name</th>
              <th>Dosing Name</th>
              <th>Issue</th>
            </tr></thead>
            <tbody>
              ${ruleIssues.map(i => {
                let issueCell;
                if (i.r9val !== undefined) {
                  // Rule 9: show highlighted name with overflow chars marked
                  issueCell = `<div class="name-field-label">${escHtml(i.r9label)}</div>
                                <div class="name-display">${buildOverflowHtml(i.r9val)}</div>
                                <div class="name-pct">▲ ${i.r9pct}% of capacity — red characters won't fit on pump screen</div>`;
                } else if (i.r14word !== undefined) {
                  // Rule 14: show drug word with yellow highlights on wrong characters
                  const wordHtml = buildSpellingHtml(i.r14word, i.r14wrong);
                  const distLabel = i.r14dist === 1 ? '1 letter difference' : `${i.r14dist} letter differences`;
                  issueCell = `<div class="spell-word">${wordHtml}${escHtml(i.r14rest)}</div>
                               <div class="spell-suggest">→ Did you mean <strong>${escHtml(i.r14suggestion)}</strong>? (${distLabel})</div>`;
                } else if (i.r15pri !== undefined) {
                  // Rule 15: show both unit values as colored chips
                  const chipA = `<span class="unit-chip ${i.r15pri.isMl ? 'is-ml' : 'non-ml'}">${escHtml(i.r15pri.value)}</span><span class="unit-chip-label">${escHtml(i.r15pri.label)}</span>`;
                  const chipB = `<span class="unit-chip ${i.r15sec.isMl ? 'is-ml' : 'non-ml'}">${escHtml(i.r15sec.value)}</span><span class="unit-chip-label">${escHtml(i.r15sec.label)}</span>`;
                  issueCell = `<div class="unit-chips">${chipA} <span style="color:#9ca3af">vs</span> ${chipB}</div>
                               <div class="unit-compat-note">mL dose units are only compatible with other mL dose units</div>`;
                } else if (i.r16priUnit !== undefined) {
                  // Rule 16: show primary unit + each conflicting section as chips
                  const priChip = `<span class="unit-chip non-ml">${escHtml(i.r16priUnit)}</span><span class="unit-chip-label">Primary (col I)</span>`;
                  const secChips = i.r16sections.map(s =>
                    `<span style="color:#9ca3af">→</span> <span class="unit-chip non-ml">${escHtml(s.value)}</span><span class="unit-chip-label">${escHtml(s.label)}</span>`
                  ).join(' ');
                  issueCell = `<div class="unit-chips">${priChip} ${secChips}</div>
                               <div class="unit-compat-note">Bolus and loading infusions are disabled on the pump when Primary Dose Unit is not /min or /hr (columns T–AO must be blank)</div>`;
                } else {
                  issueCell = `<span class="msg-col">${escHtml(i.msg)}</span>`;
                }
                return `<tr>
                  <td><span class="sheet-tag">${escHtml(i.sheet)}</span>${escHtml(i.care || '—')}</td>
                  <td>${i.row}</td>
                  <td class="drug-col">${escHtml(i.drug || '—')}</td>
                  <td>${escHtml(i.dosing || '—')}</td>
                  <td>${issueCell}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      // Override badge for non-rule-1
      section.innerHTML = `
        <div class="section-header ${headerClass}" onclick="toggleSection(this)">
          <span>${info.title}</span>
          <span style="display:flex;align-items:center;gap:8px;">
            <span class="badge">${stdBadge}</span>
            <span class="toggle">${ruleIssues.length > 0 ? '▲' : '▼'}</span>
          </span>
        </div>
        <div class="section-body ${ruleIssues.length > 0 ? 'open' : ''}">${bodyHtml}</div>
      `;
      resultsEl.appendChild(section);
      continue;
    }

    section.innerHTML = `
      <div class="section-header ${headerClass}" onclick="toggleSection(this)">
        <span>${info.title}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          <span class="badge">${badgeText}</span>
          <span class="toggle">${ruleIssues.length > 0 ? '▲' : '▼'}</span>
        </span>
      </div>
      <div class="section-body ${ruleIssues.length > 0 ? 'open' : ''}">${bodyHtml}</div>
    `;
    resultsEl.appendChild(section);
  }
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
  header.querySelector('.toggle').textContent = body.classList.contains('open') ? '▲' : '▼';
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// Wraps wrong-position characters in yellow highlight spans.
// `word` = original-case string, `wrong` = boolean[] from wrongPositions().
function buildSpellingHtml(word, wrong) {
  let html = '', inSpan = false;
  for (let i = 0; i < word.length; i++) {
    if (wrong[i] && !inSpan)       { html += '<span class="spell-wrong">'; inSpan = true; }
    if (!wrong[i] && inSpan)       { html += '</span>'; inSpan = false; }
    html += escHtml(word[i]);
  }
  if (inSpan) html += '</span>';
  return html;
}

// ─── File handling ────────────────────────────────────────────────────────────
let loadedWorkbook = null;

function processFile(file) {
  if (!file) return;
  document.getElementById('file-name-label').textContent = '📄 ' + file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      loadedWorkbook = XLSX.read(e.target.result, { type: 'array', cellDates: false });
      document.getElementById('run-btn').style.display = 'block';
    } catch(err) {
      alert('Could not read file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function runValidation() {
  if (!loadedWorkbook) return;
  const issues = validate(loadedWorkbook);
  renderResults(issues);
  document.getElementById('summary').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Drop zone
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  processFile(e.dataTransfer.files[0]);
});
document.getElementById('file-input').addEventListener('change', e => processFile(e.target.files[0]));
</script>
